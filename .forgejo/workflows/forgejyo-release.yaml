# このワークフローは、プロジェクトのリリース プロセスを自動化します。
# これは、新しいバージョンのリリースを示すパターン「v*」に一致するタグへのプッシュでトリガーされます。
# ワークフローは「テスト」、「ビルド」、「リリース」の 3 つのジョブで構成されます。
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - run: go mod tidy
      - run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
            exe: ''
          # - goos: darwin
          #   goarch: arm64
          #   archive: tar.gz
          #   exe: ''
          - goos: windows
            goarch: amd64
            archive: zip
            exe: '.exe'

    env:
      APP_NAME: ${{ github.event.repository.name }}
      VERSION: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Build and package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          artifact_base="${APP_NAME}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          binary_name="${APP_NAME}${{ matrix.exe }}"
          output_dir="build/${artifact_base}"

          mkdir -p "${output_dir}"
          GOOS='${{ matrix.goos }}' GOARCH='${{ matrix.goarch }}' \
            go build -trimpath -ldflags="-s -w" -o "${output_dir}/${binary_name}" ./

          cp README.md LICENSE "${output_dir}/" || true

          if [ '${{ matrix.archive }}' = 'zip' ]; then
            (cd build && zip -r "../dist/${artifact_base}.zip" "${artifact_base}")
          else
            tar -C build -czf "dist/${artifact_base}.tar.gz" "${artifact_base}"
          fi

      - name: Upload build artifact
        # uses: actions/upload-artifact@v3
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        # uses: actions/download-artifact@v3
        uses: https://code.forgejo.org/forgejo/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > checksums.txt

      - name: Create Forgejo Release
        uses: actions/forgejo-release@v2
        with:
          direction: upload
          url: ${{ env.GITHUB_SERVER_URL }}  # ★ Forgejoインスタンスのurl（自動取得）
          release-dir: dist                  # ★ files: → release-dir: に変更
          token: ${{ secrets.GITHUB_TOKEN }} # ★ token が必須なので追加
