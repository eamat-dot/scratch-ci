version: '3'

# デバッグ用Taskfileを読み込む（存在する場合）
# Taskfile.debug.yml は .gitignore に含まれているため、個人用設定として自由に編集可能
# サンプルは Taskfile.debug.yml.example を参照
includes:
  debug:
    aliases: [d]
    taskfile: ./.dev/Taskfile.debug.yml
    optional: true

vars:
  MODULE: __REPLACE_MODULE_NAME__
  BINARY_NAME: __REPLACE_MODULE_NAME__
  BINARY_PATH: ./bin/{{.BINARY_NAME}}{{exeExt}}

tasks:
  default:
    desc: list-all
    cmds:
      - task --list-all
    silent: true

  # default:
  #   deps:
  #     - help

  deps:
    desc: 依存パッケージをインストール
    sources:
      - go.mod
      - go.sum
    cmds:
      - go mod download
      - go mod tidy

  build:
    desc: アプリケーションをビルド(ソース変更時) >> {{.BINARY_PATH}}
    deps: [deps]
    sources:
      - '**/*.go'
    generates:
      - '{{.BINARY_PATH}}'
    vars:
      VERSION:
        sh: git describe --tags --always --dirty
    cmds:
      - mkdir -p bin
      - go build -o {{.BINARY_PATH}} .

      # - >
      #   go build
      #   -ldflags="-X {{.MODULE}}/cmd.Version={{.VERSION}}"
      #   -o {{.BINARY_PATH}}
      #   .

  build:force:
    desc: アプリケーションをビルド(強制)
    deps: [clean]
    cmds:
      - task: build

  run:
    desc: アプリケーションを実行  >> go run . -- cli args
    cmds:
      - '{{.EXEC  | default "go run ." }} {{.CLI_ARGS}}'

  run:build:
    desc: アプリケーションをビルドして実行 ({{.BINARY_NAME}} -- cli args)
    deps: [build]
    cmds:
      - task: run
        vars:
          EXEC: '{{.BINARY_PATH}}'

  run:prod:
    aliases: [rp,exe]
    desc: アプリケーションを本番モードで実行 ({{.BINARY_NAME}} -- cli args)
    cmds:
      - task: run
        vars:
          EXEC: '{{.BINARY_PATH}}'

  run:version:
    aliases: [v]
    desc: アプリケーションのバージョンを表示 ({{.BINARY_NAME}} version)
    cmds:
      - task: run
        vars:
          EXEC: '{{.BINARY_PATH}}'
          CLI_ARGS: 'version'

      - task: run
        vars:
          EXEC: '{{.BINARY_PATH}}'
          CLI_ARGS: '--version'

  test:
    desc: "テストを実行"
    cmds:
      - go test -v ./...

  test-coverage:
    desc: "カバレッジ付きでテストを実行"
    cmds:
      - go test -v -coverprofile coverage.out ./...
      - go tool cover -html coverage.out -o coverage.html

  lint:
    desc: "コードの静的解析"
    cmds:
      - golangci-lint run -v

  act:
    desc: "ローカルでGitHub Actions CIを実行 (actが必要)"
    cmds:
      - act push -W .github/workflows/ci.yml

  # act:lint:
  #   desc: "ローカルでgolangci-lintのみ実行 (actが必要)"
  #   cmds:
  #     - act push -j ci --job "Lint, Test, Build" -s GITHUB_TOKEN={{.GITHUB_TOKEN}}

  clean:
    desc: 'ビルド成果物を削除 (bin/ 直下のファイルのみ削除)'
    cmds:
      - go clean
      - rm -rf ./bin/{{.BINARY_NAME}}{{exeExt}}

  build:prod:
    desc: "本番環境用にビルド（最適化）"
    deps: [clean, deps]
    cmds:
      - mkdir -p bin
      - go build -ldflags "-s -w" -o {{.BINARY_PATH}} .

  all:
    desc: "リント、テスト、ビルドを順次実行"
    cmds:
      - task: lint
      - task: test
      - task: build

  # ci:
  #   desc: "CI相当のチェックを実行 (lint, test, build)"
  #   cmds:
  #     - task: lint
  #     - task: test
  #     - task: build

  # ci:local:
  #   desc: "ローカルでCI全体を実行 (act + test + build)"
  #   cmds:
  #     - task: act
  #     - task: test
  #     - task: build

  debug:init:
    desc: "デバッグ用のタスクの初期化（Taskfile.debug.ymlを作成）"
    cmds:
      - cp ./.dev/Taskfile.debug.yml.sample ./.dev/Taskfile.debug.yml
