version: '3'

vars:
  TEST_TITLES_FILE: './test-titles.txt'
  OUTPUT_DIR: './output/debug'

tasks:
  default:
    cmds:
      - task: help
    silent: true

  help:
    aliases: [h]
    desc: ">> go run . help"
    cmds:
      - go run . help

  # cmdサンプル
  sample:
    desc: ">> go run . sample -- cli args"
    cmds:
      - go run . sample  {{.CLI_ARGS}}

  # CLIコマンドごとにタスクを定義(__command__をコマンド名に置き換えて使う)
  __command__:
    desc: ">> go run . __command__ -- cli args"
    cmds:
      - go run . __command__  {{.CLI_ARGS}}


