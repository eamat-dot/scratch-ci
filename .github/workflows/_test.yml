name: test

on:
  workflow_dispatch:
  push:
    tags:
      - 'test*'
    # branches:
    #   - '**'
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - run: go mod tidy

      - run: go test -v ./...
      - run: go build -v ./...
